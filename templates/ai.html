{% extends "base.html" %}
{% block content %}
<div class="mb-6">
    <h1 class="text-4xl font-extrabold text-white tracking-tight mb-1">AI-инсайты</h1>
    <p class="text-gray-500">Искусственный интеллект анализирует ваши метрики</p>
</div>
<hr class="border-white/5 mb-6">

{% if not has_data %}
<div class="glass-card text-center py-16">
    <p class="text-gray-400 text-lg mb-6">Нет данных</p>
    <button class="btn-primary" hx-post="/load-sample" hx-target="body">🎲 Загрузить демо-данные</button>
</div>
{% else %}
<button class="btn-primary mb-6" hx-post="/ai-generate" hx-target="#ai-result" hx-indicator="#ai-loading">✨ Сгенерировать инсайты</button>
<div id="ai-loading" class="htmx-indicator text-gray-500 mb-4">⏳ Анализирую...</div>
<div id="ai-result"></div>
{% endif %}
{% endblock %}
