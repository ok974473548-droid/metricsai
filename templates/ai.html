{% extends "base.html" %}
{% block content %}
<div class="mb-8 animate-in">
    <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2" style="letter-spacing: -0.03em;">AI-инсайты</h1>
    <p class="text-sm" style="color: var(--text-secondary);">Искусственный интеллект анализирует ваши метрики</p>
</div>

{% if not has_data %}
<div class="glass-card text-center py-20 animate-in delay-1">
    <div class="text-5xl mb-6">🤖</div>
    <p class="text-lg mb-2" style="color: var(--text-secondary);">Нет данных</p>
    <button class="btn-primary" hx-post="/load-sample" hx-target="body">🎲 Загрузить демо-данные</button>
</div>
{% else %}
<div class="animate-in delay-1">
    <button class="btn-primary mb-6" hx-post="/ai-generate" hx-target="#ai-result" hx-indicator="#ai-loading">
        <span style="margin-right: 0.5rem;">✨</span>Сгенерировать инсайты
    </button>
    <div id="ai-loading" class="htmx-indicator" style="color: var(--text-secondary);">⏳ Анализирую метрики...</div>
    <div id="ai-result"></div>
</div>
{% endif %}
{% endblock %}
