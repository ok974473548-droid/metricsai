<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetricsAI — Product & Marketing Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0B0F19; color: #F8FAFC; }
        .glass-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 1.5rem; }
        .glass-card:hover { border-color: rgba(255,255,255,0.12); }
        .metric-container { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 1.25rem; }
        .metric-value { font-size: 1.8rem; font-weight: 700; color: #F8FAFC; }
        .metric-label { font-size: 0.75rem; color: #64748B; text-transform: uppercase; letter-spacing: 0.08em; }
        .btn-primary { background: #F8FAFC; color: #0B0F19; border-radius: 10px; padding: 0.6rem 1.5rem; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(248,250,252,0.2); }
        .btn-secondary { background: rgba(255,255,255,0.06); color: #E2E8F0; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 0.6rem 1.5rem; font-weight: 600; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .sidebar { background: linear-gradient(180deg, #0B0F19 0%, #111827 100%); border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 0.6rem 1.25rem; border-radius: 8px; color: #64748B; font-weight: 500; font-size: 0.85rem; transition: all 0.2s; display: block; }
        .nav-item:hover { background: rgba(255,255,255,0.04); color: #E2E8F0; }
        .nav-item.active { background: rgba(255,255,255,0.06); color: #F8FAFC; }
        .ai-insight { background: rgba(255,255,255,0.02); border-left: 3px solid #F8FAFC; border-radius: 0 12px 12px 0; padding: 1.25rem; margin: 0.75rem 0; }
        .ai-header { font-weight: 600; font-size: 0.85rem; color: #F8FAFC; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .public-banner { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(11,15,25,0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <div class="sidebar fixed left-0 top-0 h-screen w-60 p-6 flex flex-col z-50">
            <div class="text-2xl font-extrabold text-white tracking-tight mb-8">{{ white_label.logo_text }}</div>
            <nav class="flex-1 space-y-1">
                <a href="/" class="nav-item {% if page == 'dashboard' %}active{% endif %}">📊 Дашборд</a>
                <a href="/funnel" class="nav-item {% if page == 'funnel' %}active{% endif %}">🔻 Воронка</a>
                <a href="/ai" class="nav-item {% if page == 'ai' %}active{% endif %}">🤖 AI-инсайты</a>
                <a href="/ab" class="nav-item {% if page == 'ab' %}active{% endif %}">⚖️ A/B калькулятор</a>
            </nav>
            <div class="text-xs text-gray-600 mt-auto">MetricsAI v2.0<br>FastAPI + HTMX</div>
        </div>

        <!-- Main Content -->
        <div class="ml-60 flex-1 p-8">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
