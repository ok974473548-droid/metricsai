{% extends "base.html" %}
{% block content %}
<div class="mb-6">
    <h1 class="text-4xl font-extrabold text-white tracking-tight mb-1">A/B калькулятор</h1>
    <p class="text-gray-500">Статистическая значимость разницы конверсий</p>
</div>
<hr class="border-white/5 mb-6">

<div class="glass-card">
    <form hx-post="/ab-calculate" hx-target="#ab-result" class="space-y-6">
        <div class="grid grid-cols-2 gap-8">
            <div>
                <h3 class="text-lg font-bold text-white mb-4">🅰️ Вариант A</h3>
                <div class="space-y-3">
                    <input type="number" name="conv_a" value="120" placeholder="Конверсии A" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white">
                    <input type="number" name="n_a" value="1000" placeholder="Посетители A" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white">
                </div>
            </div>
            <div>
                <h3 class="text-lg font-bold text-white mb-4">🅱️ Вариант B</h3>
                <div class="space-y-3">
                    <input type="number" name="conv_b" value="150" placeholder="Конверсии B" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white">
                    <input type="number" name="n_b" value="1000" placeholder="Посетители B" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white">
                </div>
            </div>
        </div>
        <div>
            <select name="confidence" class="bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white">
                <option value="0.95">95% доверие</option>
                <option value="0.99">99% доверие</option>
                <option value="0.90">90% доверие</option>
            </select>
        </div>
        <button type="submit" class="btn-primary">🚀 Рассчитать</button>
    </form>
    <div id="ab-result"></div>
</div>
{% endblock %}
